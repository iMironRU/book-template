[book]
title = "Название книги"        # обновляется через ./book.sh init
authors = ["Автор"]
language = "ru"
src = "chapters"
multilingual = false

[build]
build-dir = "book"

[output.html]
site-url = "/"
git-repository-url = ""
edit-url-template = ""
additional-js = ["theme/version.js"]
additional-css = ["theme/book-extra.css"]
no-section-label = false
fold.enable = true
fold.level = 1
search.enable = true
search.limit = 30
search.teaser-word-count = 30

[output.html.playground]
editable = false
